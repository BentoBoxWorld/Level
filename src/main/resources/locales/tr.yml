      click-to-view: "<yellow> Tıkla <gray> görüntülemek için."
      click-to-previous: "<yellow> Tıkla <gray> önceki sayfayı görüntülemek için."
      click-to-next: "<yellow> Tıkla <gray> sonraki sayfayı görüntülemek için."
      click-to-select: "<yellow> Tıkla <gray> seçmek için."
      left-click-to-cycle-up: "<yellow> Sol Tıkla <gray> yukarı almak için."
      right-click-to-cycle-down: "<yellow> Sağ Tıkla <gray> aşağı almak için."
      left-click-to-change: "<yellow> Sol Tıkla <gray> düzenlemek için."
      right-click-to-clear: "<yellow> Sağ Tıkla <gray> temizlemek için."
      click-to-asc: "<yellow> Tıkla <gray> artan sırada sıralamak için."
      click-to-desc: "<yellow> Tıkla <gray> azalan sırada sıralamak için."
      click-to-warp: "<yellow> Tıkla <gray> ışınlanmak için."
      click-to-visit: "<yellow> Tıkla <gray> ziyaret etmek için."
