    exit-string: iptal, çıkış, bırak
    write-search: "<yellow> Lütfen bir arama değeri girin. (Çıkmak için 'iptal' yazın)"
    search-updated: "<green> Arama değeri güncellendi."
    cancelled: "<red> Konuşma iptal edildi!"
    no-value: "<red> Bu eşyanın değeri yok."
    unknown-item: "<red> '[material]' oyunda mevcut değil."
    value: "<gray> '[material]' değeri: <yellow>[value]"
    value-underwater: "<gray> '[material]' deniz seviyesi altı değeri: <yellow>[value]"
    empty-hand: "<red> Elinde hiç blok yok"
    you-have: "<gray> Son sayımda [number] tanen vardı."
    you-can-place: "<gray> [number] adete kadar yerleştirebilirsin ve sayılırlar"
