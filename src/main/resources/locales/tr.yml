admin:
  level:
    parameters: "<oyuncu>"
    description: "Bir oyuncunun ada seviyesini hesapla"
    sethandicap:
      parameters: <oyuncu> [+/-]<handikap>
      description: |
        ada *handikabını* ayarla veya değiştir
        örn. +10 10 seviye kaldırır,
        30 handikabı 30'a ayarlar,
        -20 20 seviye ekler
      changed: "<green> Ada başlangıç handikabı [number] değerinden [new_number] değerine değiştirildi."
      invalid-level: "<red> Geçersiz handikap. Tam sayı kullanın."
  levelstatus:
    description: tarama için kaç adanın kuyrukta olduğunu göster
    islands-in-queue: "<green> Kuyrukta bulunan adalar: [number]"
  top:
    description: "İlk 10 adayı sırala"
    unknown-world: "<red> Bilinmeyen dünya!"
    display: "<white>[rank]. <green>[name] <gray>- <aqua>[level]"
    remove:
      description: oyuncuyu İlk On'dan kaldır
      parameters: "<oyuncu>"
  stats:
    description: "bu sunucudaki adaların istatistiklerini göster"
    title: "Sunucu Ada İstatistikleri"
    world: "<green> [name]"
    no-data: "<red> İşlenecek veri yok."
    average-level: "Ortalama Ada Seviyesi: [number]"
    median-level: "Medyan Ada Seviyesi: [number]"
    mode-level: "Mod Ada Seviyesi: [number]"
    highest-level: "En Yüksek Ada Seviyesi: [number]"
    lowest-level: "En Düşük Ada Seviyesi: [number]"
    distribution: "Ada Seviyesi Dağılımı:"
    islands: "ada"
island:
  level:
    parameters: "[oyuncu]"
    description: "Kendi ada seviyeni hesapla veya başka oyuncunun ada seviyesini öğren"
    calculating: "<green> Seviye hesaplanıyor..."
    estimated-wait: "<green> Tahmini bekleme: [number] saniye"
    in-queue: "<green> Kuyrukta [number]. sıradasın"
    island-level-is: "<green> Ada seviyesi <aqua>[level]"
    required-points-to-next-level: "<green> Seviye ilerlemesi: <gold> [progress]<aqua> /<yellow> [levelcost] <green> puan"
    deaths: "<red> ([number] ölüm)"
    cooldown: "<red> Bunu tekrar yapmak için <aqua>[time] <red> saniye beklemelisin"
    in-progress: "<gold> Ada seviyesi hesaplaması devam ediyor..."
    time-out: "<red> Seviye hesaplaması çok uzun sürdü. Lütfen daha sonra tekrar deneyin."
  detail:
    description: "adanın blok ayrıntılarını gösterir"
  top:
    description: "İlk 10 adayı sırala"
    gui-title: "<green> İlk 10 Ada"
    gui-heading: "<gold>Sıralama: <dark_aqua>[rank]"
    island-level: "<green> Seviye: <gray>[level]"
    warp-to: "<green> [name] oyuncusunun adasına ışınlanıyor"
  level-details:
    above-sea-level-blocks: Deniz Seviyesi Üstü Bloklar
    spawners: Spawner'lar
    underwater-blocks: Su Altı Bloklar
    all-blocks: Tüm Bloklar
    no-island: "<red> Ada yok!"
    names-island: "[name]'nin adası"
    syntax: "[name] x [number]"
    hint: "<red> Blok raporunu görmek için level komutunu çalıştırın"
level:
  commands:
    value:
      parameters: "[hand|<malzeme>]"
      description: blokların değerini gösterir. Elinizdeki eşyanın değerini görmek için sona 'hand' ekleyin.
  gui:
    titles:
      top: "<black><bold> En İyi Adalar"
      detail-panel: "<black><bold> [name]'nin adası"
      value-panel: "<black><bold> Blok Değerleri"
    buttons:
      island:
        empty: '<white><bold> [name]. sıra'
        name: '<white><bold> [name]'
        description: |-
          [owner]
          [members]
          [place]
          [level]
        owners-island: "[player]'nin adası"
        owner: "<gray><bold> Sahip: <reset><aqua> [player]"
        members-title: "<gray><bold> Üyeler:"
        member: "<aqua> - [player]"
        unknown: "bilinmiyor"
        place: "<gray><italic> [number]. <reset><gray> sıra"
        level: "<gray> Seviye: <italic> [number]"
      material:
        name: "<white><bold> [number] x [material]"
        description: |-
          [description]
          [count]
          [value]
          [calculated]
          [limit]
          [id]
        id: "<gray> Blok ID: <yellow> [id]"
        value: "<gray> Blok değeri: <yellow> [number]"
        limit: "<gray> Blok limiti: <yellow> [number]"
        count: "<gray> Blok sayısı: <yellow> [number]"
        calculated: "<gray> Hesaplanan değer: <yellow> [number]"
      value_blocks:
        name: "<white><bold> Değeri Olan Tüm Bloklar"
        description: |-
          <gray> Adada değeri olan
          <gray> tüm blokları göster.
      all_blocks:
        name: "<white><bold> Tüm Bloklar"
        description: |-
          <gray> Adadaki tüm
          <gray> blokları göster.
      above_sea_level:
        name: "<white><bold> Deniz Seviyesi Üstü Bloklar"
        description: |-
          <gray> Sadece deniz
          <gray> seviyesi üstündeki
          <gray> blokları göster.
      underwater:
        name: "<white><bold> Deniz Seviyesi Altı Bloklar"
        description: |-
          <gray> Sadece deniz
          <gray> seviyesi altındaki
          <gray> blokları göster.
      spawner:
        name: "<white><bold> Spawner'lar"
        description: |-
          <gray> Sadece spawner'ları göster.
        block-name: "<aqua> Spawner"
      filters:
        name:
          name: "<white><bold> İsme Göre Sırala"
          description: |-
            <gray> Tüm blokları isme göre sırala.
        value:
          name: "<white><bold> Değere Göre Sırala"
          description: |-
            <gray> Tüm blokları değerlerine göre sırala.
        count:
          name: "<white><bold> Sayıya Göre Sırala"
          description: |-
            <gray> Tüm blokları sayılarına göre sırala.
      value:
        name: "<white><bold> [material]"
        description: |-
          [description]
          [value]
          [underwater]
          [limit]
          [id]
        id: "<gray> Blok ID: <yellow> [id]"
        value: "<gray> Blok değeri: <yellow> [number]"
        underwater: "<gray> Deniz seviyesi altı: <yellow> [number]"
        limit: "<gray> Blok limiti: <yellow> [number]"
      previous:
        name: "<white><bold> Önceki Sayfa"
        description: |-
          <gray> [number]. sayfaya geç
      next:
        name: "<white><bold> Sonraki Sayfa"
        description: |-
          <gray> [number]. sayfaya geç
      search:
        name: "<white><bold> Ara"
        description: |-
          <gray> Belirli bir değer
          <gray> ara.
        search: "<aqua> Değer: [value]"
