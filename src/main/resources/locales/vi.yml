admin:
  level:
    parameters: <người chơi>
    description: tính toán cấp độ đảo của người chơi
    sethandicap:
      parameters: <người chơi> [+/-]<handicap>
      description: |
        đặt hoặc thay đổi *handicap* của đảo
        ví dụ: +10 sẽ bỏ 10 cấp,
        30 sẽ đặt handicap thành 30,
        -20 sẽ thêm 20 cấp
      changed: '&a Handicap ban đầu của đảo đã thay đổi từ [number] thành [new_number].'
      invalid-level: '&c Handicap không hợp lệ. Hãy dùng số nguyên.'
  levelstatus:
    description: xem bao nhiêu đảo đang trong hàng chờ được quét
    islands-in-queue: '&a Đảo đang chờ: [number]'
  top:
    description: xem bảng xếp hạng TOP 10
    unknown-world: '&c Thế giới không xác định!'
    display: '&f[rank]. &a[name] &7- &b[level]'
    remove:
      description: xoá người khỏi TOP 10
      parameters: <người chơi>
  stats:
    description: "hiển thị thống kê đảo trên máy chủ này"
    title: "Thống Kê Đảo Máy Chủ"
    world: "&a [name]"
    no-data: "&c Không có dữ liệu để xử lý."
    average-level: "Cấp đảo trung bình: [number]"
    median-level: "Cấp đảo trung vị: [number]"
    mode-level: "Cấp đảo phổ biến nhất: [number]"
    highest-level: "Cấp đảo cao nhất: [number]"
    lowest-level: "Cấp đảo thấp nhất: [number]"
    distribution: "Phân phối cấp đảo:"
    islands: "đảo"
island:
  level:
    parameters: '[người chơi]'
    description: tính toán cấp đảo của bạn hoặc xem cấp đảo của [người chơi]
    calculating: '&a Đang tính toán cấp đảo...'
    estimated-wait: '&a Thời gian còn lại: [number] giây'
    in-queue: '&a Bạn đang ở vị trí [number] trong hàng chờ'
    island-level-is: '&a Cấp đảo là &b[level]'
    required-points-to-next-level: '&a Tiến độ cấp: &6 [progress]&b /&e [levelcost] &a điểm'
    deaths: '&c([number] lần chết)'
    cooldown: '&c Bạn phải chờ &b[time] &c giây trước khi có thể làm điều đó'
    in-progress: '&6 Đang tính toán cấp đảo...'
    time-out: '&c Tính toán cấp đảo quá lâu. Vui lòng thử lại sau.'
  detail:
    description: "hiển thị chi tiết các khối trên đảo của bạn"
  top:
    description: xem TOP 10
    gui-title: '&a TOP 10'
    gui-heading: '&6[name]: &B[rank]'
    island-level: '&b Cấp [level]'
    warp-to: '&A Đang dịch chuyển đến đảo của [name]'
  level-details:
