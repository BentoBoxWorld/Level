---
admin:
  level:
    parameters: "<player>"
    description: calcule le niveau d'île d'un joueur
    sethandicap:
      parameters: "<player> <handicap>"
      description: définir le handicap de l'île, généralement le niveau de l'île de
        départ
      changed: "<green> le handicap initial de l'île est passé de [number] à [new_number]."
      invalid-level: "<red> Handicap non valide. Utilisez un nombre entier."
  levelstatus:
    description: affiche le nombre d'îles dans la file d'attente pour l'analyse
    islands-in-queue: "<green> Nombre d'Îles dans la file d'attente: [number]"
  top:
    description: affiche le top 10 des îles
    unknown-world: "<red>Monde inconnu."
    display: "<white>[rank]. <green>[name] <gray>- <aqua>[level]"
    remove:
      description: retire le joueur du top 10
      parameters: "<player>"
  stats:
    description: "afficher les statistiques des îles sur ce serveur"
    title: "Statistiques des Îles du Serveur"
    world: "<green> [name]"
    no-data: "<red> Aucune donnée à traiter."
    average-level: "Niveau moyen des îles: [number]"
    median-level: "Niveau médian des îles: [number]"
    mode-level: "Niveau modal des îles: [number]"
    highest-level: "Niveau le plus élevé des îles: [number]"
    lowest-level: "Niveau le plus bas des îles: [number]"
    distribution: "Distribution des niveaux d'îles:"
    islands: "îles"
island:
  level:
    parameters: "[joueur]"
    description: calcule le niveau de votre île ou affiche le niveau d'un [joueur]
    calculating: "<green>Calcul du niveau en cours..."
    estimated-wait: "<green> Attente estimée: [number] seconds"
    in-queue: "<green> Vous êtes le numéro [number ] dans la file d'attente"
    island-level-is: "<green>Le niveau d'île est <aqua>[level]"
    required-points-to-next-level: "<green> Progression du niveau: <gold> [progress]<aqua> /<yellow> [levelcost] <green> points"
    deaths: "<red>([number] morts)"
    cooldown: "<red>Vous devez attendre <aqua>[time] <red>secondes avant de pouvoir refaire
      cette action"
    in-progress: "<gold> Le calcul du niveau de l'île est en cours ..."
    time-out: "<red> Le calcul du niveau a pris trop de temps. Veuillez réessayer plus
      tard."
  donate:
    parameters: "[hand [amount]]"
    description: "donate blocks to permanently raise island level"
    must-be-on-island: "<red>You must be on your island to donate blocks."
    no-permission: "<red>You do not have permission to donate blocks on this island."
    no-value: "<red>That block has no level value."
    invalid-amount: "<red>Invalid amount. Use a positive number."
    invalid-item: "<red>Seuls les blocs avec une valeur de niveau configurée peuvent être donnés."
    empty: "<red>There are no valid blocks to donate."
    cancelled: "<yellow>Donation cancelled. Items returned."
    success: "<green>Donated [number] blocks for <aqua>[points]<green> points! These points are permanent."
    confirm: "<red><bold>Confirm - Items will be DESTROYED!"
    cancel: "<green><bold>Cancel - Return Items"
    gui-title: "<black><bold>Donate Blocks"
    gui-info: "<gold>Donate blocks to your island|<gray>Currently donated: <gold>[points]<gray> points|<red>Warning: donated items are|<red>destroyed and cannot be returned!"
    preview: "<yellow>Points to add: <gold>[points]|<red>These items will be destroyed!"
    hand:
      keyword: "main"
      success: "<green>Donated [number] x [material] for <aqua>[points]<green> permanent points!"
      not-block: "<red>You must be holding a placeable block to donate."
      confirm-prompt: "<red>About to DESTROY <gold>[number] x [material]<red> for <aqua>[points]<red> permanent points."
    inv:
      keyword: "inv"
      confirm-header: "<red>Ces blocs vont être DÉTRUITS de votre inventaire :"
      confirm-line: "<gold>[number] x [material] <gray>= <aqua>[points]<gray> points"
      confirm-total: "<red>Total : <aqua>[points]<red> points permanents."
  top:
    description: affiche le top 10
    gui-title: "<green>Top 10"
    gui-heading: "<gold>[name]: <aqua>[rank]"
    island-level: "<aqua>Niveau [level]"
    warp-to: "<green>Téléportation vers l'île de [name]"
  detail:
    description: "affiche le détail des blocs de votre île"
  level-details:
    above-sea-level-blocks: Blocs au-dessus du niveau de la mer
    spawners: Spawners
    underwater-blocks: Blocs en-dessous du niveau de la mer
    all-blocks: Total des blocs
    no-island: "<red> Pas d'île!"
    names-island: île de [name]
    syntax: "[name] x [number]"
    hint: "<red> Exécuter level pour voir le rapport des blocs"
protection:
  flags:
    ISLAND_BLOCK_DONATION:
      description: |-
        <green>Toggle who can donate</green>
        <green>blocks to raise island level.</green>
      name: Block Donation
      hint: Block donation not allowed

level:
  commands:
    value:
      parameters: "[hand|<material>]"
      description: affiche la valeur des blocs. Ajoutez 'hand' à la fin pour afficher
        la valeur de l'objet en main.
  gui:
    titles:
      top: "<black><bold> Top Islands"
      detail-panel: "<black><bold> [name]'s island"
      value-panel: "<black><bold> Block Values"
    buttons:
      island:
        empty: "<white><bold> [name]. place"
        name: "<white><bold> [name]"
        description: |-
          [owner]
          [members]
          [place]
          [level]
        owners-island: "[player]'s Island"
        owner: "<gray><bold> Propriétaire: <reset><aqua> [player]"
        members-title: "<gray><bold> Membres:"
        member: "<aqua> - [player]"
        unknown: inconnue
        place: "<gray><italic> [number]. <reset><gray> place"
        level: "<gray> Level: <italic> [number]"
      material:
        name: "<white><bold> [number] x [material]"
        description: |-
          [description]
          [count]
          [value]
          [calculated]
          [limit]
          [id]
        id: "<gray> Block id: <yellow> [id]"
        value: "<gray> Block value: <yellow> [number]"
        limit: "<gray> Block limit: <yellow> [number]"
        count: "<gray> Nombre de blocs: <yellow> [number]"
        calculated: "<gray> Valeur calculée: <yellow> [number]"
      value_blocks:
        name: "<white><bold> Tous les Blocs avec Valeur"
        description: |-
          <gray> Afficher tous les blocs
          <gray> avec une valeur sur l'île.
      all_blocks:
        name: "<white><bold> Tous les blocs"
        description: |-
          <gray> Afficher tous les blocs
          <gray> sur l'île.
      above_sea_level:
        name: "<white><bold> Blocs au-dessus du niveau de la mer"
        description: |-
          <gray> Afficher uniquement les blocs
          <gray> qui sont au-dessus du niveau
          <gray> de la mer.
      underwater:
        name: "<white><bold> Blocs sous le niveau de la mer"
        description: |-
          <gray> Afficher uniquement les blocs
          <gray> situés sous le niveau
          <gray> de la mer.
      spawner:
        name: "<white><bold> Spawners"
        description: "<gray> Afficher uniquement les spawners."
        block-name: "<aqua> Spawner"
      donated:
        name: "<white><bold>Donated Blocks"
        description: |-
          <gray>Display blocks permanently
          <gray>donated to island level.
      filters:
        name:
          name: "<white><bold> STrier par nom"
          description: "<gray> Trier tous les blocs par nom."
        value:
          name: "<white><bold> Trier par valeur"
          description: "<gray> Triez tous les blocs par leur valeur."
        count:
          name: "<white><bold> Trier par nombre"
          description: "<gray> Trier tous les blocs par leur montant."
      value:
        name: "<white><bold> [material]"
        description: |-
          [description]
          [value]
          [underwater]
          [limit]
          [id]
        id: "<gray> Block id: <yellow> [id]"
        value: "<gray> Block value: <yellow> [number]"
        underwater: "<gray> Sous le niveau de la mer : <yellow> [number]"
        limit: "<gray> Block limit: <yellow> [number]"
      previous:
        name: "<white><bold> Page précédente"
        description: "<gray> Passer à la page [number]"
      next:
        name: "<white><bold> Page suivante"
        description: "<gray> Passer à la page [number]"
      search:
        name: "<white><bold> Rechercher"
        description: "<gray> Recherche une valeur \n<gray> spécifique."
        search: "<aqua> Valeur : [value]"
    tips:
      click-to-view: "<yellow> Cliquez <gray> pour afficher."
      click-to-previous: "<yellow> Cliquez <gray> pour afficher la page précédente."
      click-to-next: "<yellow> Cliquez <gray> pour afficher la page suivante."
      click-to-select: "<yellow> Cliquez <gray> pour sélectionner."
      left-click-to-cycle-up: "<yellow> Clic gauche <gray> pour monter."
      right-click-to-cycle-down: "<yellow> Clic droit <gray> pour descendre."
      left-click-to-change: "<yellow> Clic gauche <gray> pour éditer."
      right-click-to-clear: "<yellow> Clic droit <gray> pour effacer."
      click-to-asc: "<yellow> Cliquez <gray> pour trier par ordre croissant."
      click-to-desc: "<yellow> Cliquez <gray> pour trier par ordre décroissant."
      click-to-warp: "<yellow> Cliquer <gray> to warp."
      click-to-visit: "<yellow> Cliquer <gray> pour visiter."
      right-click-to-visit: "<yellow> Clic droit<gray> pour visiter."
  conversations:
