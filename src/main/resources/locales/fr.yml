    search-updated: "<green> Valeur de recherche mise à jour."
    cancelled: "<red> Conversation annulée !"
    no-value: "<red> Cet item n'a aucune valeur."
    unknown-item: "<red> Le '[material]' n'existe pas dans le jeu."
    value: "<gray> La valeur de '[material]' est : <yellow>[value]"
    value-underwater: "<gray> La valeur de '[material]' sous le niveau de la mer : <yellow>[value]"
    empty-hand: "<red> Il n'y a pas de blocs dans votre main"
    you-have: "<gray> Vous en avez [number] au dernier décompte."
    you-can-place: "<gray> Vous pouvez en placer jusqu'à [number] et les faire compter"
