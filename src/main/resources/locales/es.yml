---
admin:
  level:
    parameters: "<player>"
    description: Calcula el nivel de la isla del jugador
    sethandicap:
      parameters: "<player> <handicap>"
      description: Define la desventaja de la isla, usualmente el nivel inicial para
        nuevas islas
      changed: "<green>Desventaja inicial de la isla cambiado de [number] a [new_number]."
      invalid-level: "<red>Número no válido. Usa un número entero."
  levelstatus:
    description: Muestra cuantas islas hay en la cola para escanear
    islands-in-queue: "<green>Islas en cola: [number]"
    island-detail: "<gray>- [type] <aqua>[world] [xyz]<gray>, transcurrido <yellow>[elapsed]<gray>, chunks <yellow>[scanned]/[total]"
    island-queued: "<gray>- [type] <aqua>[world] [xyz] <gray>(en espera)"
    type-zero: "<gold>cero"
    type-regular: "<green>regular"
  top:
    description: Muestra la lista de las diez primeras islas
    unknown-world: "<red>¡Mundo desconocido!"
    display: "<white>[rank]. <green>[name] <gray>- <aqua>[level]"
    remove:
      description: Elimina a un jugador de los diez primeros
      parameters: "<jugador>"
  stats:
    description: "mostrar estadísticas de islas en este servidor"
    title: "Estadísticas de Islas del Servidor"
    world: "<green> [name]"
    no-data: "<red> No hay datos para procesar."
    average-level: "Nivel promedio de isla: [number]"
    median-level: "Nivel mediano de isla: [number]"
    mode-level: "Nivel modal de isla: [number]"
    highest-level: "Nivel más alto de isla: [number]"
    lowest-level: "Nivel más bajo de isla: [number]"
    distribution: "Distribución de niveles de isla:"
    islands: "islas"
island:
  level:
    parameters: "[player]"
    description: Calcula tu nivel de isla o muestra el nivel de [player]
    calculating: "<green>Calculando nivel..."
    estimated-wait: "<green>Espera estimada: [number] segundos"
    in-queue: "<green>Estás en el puesto [number] de la cola"
    island-level-is: "<green>Nivel de isla es de <aqua>[level]"
    required-points-to-next-level: "<green> Progreso de nivel: <gold> [progress]<aqua> /<yellow> [levelcost] <green> puntos"
    deaths: "<red>([number] Muertes)"
    cooldown: "<red>Debes esperar <aqua>[time] <red>segundos para poder volver a hacer esto."
    in-progress: "<gold>El Calculo del nivel de la islas está en progreso..."
    time-out: "<red>El calculo del nivel de la isla está tardando. Intente más tarde."
  donate:
    parameters: "[hand [amount]]"
    description: "donate blocks to permanently raise island level"
    must-be-on-island: "<red>You must be on your island to donate blocks."
    no-permission: "<red>You do not have permission to donate blocks on this island."
    no-value: "<red>That block has no level value."
    invalid-amount: "<red>Invalid amount. Use a positive number."
    invalid-item: "<red>Solo se pueden donar bloques con un valor de nivel configurado."
    empty: "<red>There are no valid blocks to donate."
    cancelled: "<yellow>Donation cancelled. Items returned."
    success: "<green>Donated [number] blocks for <aqua>[points]<green> points! These points are permanent."
    confirm: "<red><bold>Confirm - Items will be DESTROYED!"
    cancel: "<green><bold>Cancel - Return Items"
    gui-title: "<black><bold>Donate Blocks"
    gui-info: "<gold>Donate blocks to your island|<gray>Currently donated: <gold>[points]<gray> points|<red>Warning: donated items are|<red>destroyed and cannot be returned!"
    preview: "<yellow>Points to add: <gold>[points]|<red>These items will be destroyed!"
    limit-reached: "<red>Se ha alcanzado el límite de donación para [material]."
    limit-notice: "<gold>Algunos bloques están sujetos a límites|<gold>y no serán donados"
    hand:
      keyword: "mano"
      success: "<green>Donated [number] x [material] for <aqua>[points]<green> permanent points!"
      not-block: "<red>You must be holding a placeable block to donate."
      confirm-prompt: "<red>About to DESTROY <gold>[number] x [material]<red> for <aqua>[points]<red> permanent points."
    inv:
      keyword: "inv"
      confirm-header: "<red>Estos bloques serán DESTRUIDOS de tu inventario:"
      confirm-line: "<gold>[number] x [material] <gray>= <aqua>[points]<gray> puntos"
      confirm-total: "<red>Total: <aqua>[points]<red> puntos permanentes."
  detail:
    description: "muestra el detalle de los bloques de tu isla"
  top:
    description: Muestra el top de islas
    gui-title: "<green>Top diez"
    gui-heading: "<gold>[name]: <aqua>[rank]"
    island-level: "<aqua>Nivel [level]"
    warp-to: "<green>Llevándote a la isla de [name]"
  level-details:
