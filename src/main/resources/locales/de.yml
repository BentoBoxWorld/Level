---
admin:
  level:
    parameters: "<Spieler>"
    description: Berechne das Insel Level für den Spieler
    sethandicap:
      parameters: <Spieler> [+/-]<Handicap>
      description: |
        Setze oder ändere das Insel-*Handicap*
        z.B. +10 entfernt 10 Level,
        30 setzt Handicap auf 30,
        -20 fügt 20 Level hinzu
      changed: "<green> Das anfängliche Insel-Handicap wurde von [number] auf [new_number] geändert."
      invalid-level: "<red> Ungültiges Handicap. Verwende eine ganze Zahl."
  levelstatus:
    description: Zeige wie viele Inseln in der Warteschlange für den Scan sind
    islands-in-queue: "<green> Inseln in der Warteschlange: [number]"
  top:
    description: Zeige die Top-10 Liste
    unknown-world: "<red> Unbekannte Welt!"
