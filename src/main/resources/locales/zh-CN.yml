admin:
  level:
    parameters: <player>
    description: 计算指定玩家的岛屿等级
    sethandicap:
      parameters: <player> <handicap>
      description: 设置偏差值, 通常用于抵消初始岛屿等级, 来保证岛屿等级从零开始. 实际岛屿等级 - <handicap> = 最终的岛屿等级
      changed: '<green>岛屿的偏差值从[number]更改为[new_number]'
      invalid-level: '<red>偏差值无效, 请使用整数'
  levelstatus:
    description: 显示等级计算队列中的岛屿
    islands-in-queue: '<green>列队中的岛屿: [number]'
    island-detail: "<gray>- [type] <aqua>[world] [xyz]<gray>, 已用时 <yellow>[elapsed]<gray>, 区块 <yellow>[scanned]/[total]"
    island-queued: "<gray>- [type] <aqua>[world] [xyz] <gray>(等待中)"
    type-zero: "<gold>清零"
    type-regular: "<green>常规"
  top:
    description: 显示前十名
    unknown-world: '<red>未知的世界!'
    display: '<white>[rank]. <green>[name] <gray>- <aqua>[level]'
    remove:
      description: 将玩家移出前十名
      parameters: <player>
  stats:
    description: 显示该服务器上岛屿的统计数据
    title: 服务器岛屿数据
    world: '<green>[name]'
    no-data: '<red>没有数据.'
    average-level: '平均岛屿等级: [number]'
    median-level: '中位数岛屿等级: [number]'
    mode-level: '众数岛屿等级: [number]'
    highest-level: '最高岛屿等级: [number]'
    lowest-level: '最低岛屿等级: [number]'
    distribution: '岛屿等级分布:'
    islands: 个岛屿
island:
  level:
    parameters: '[player]'
    description: 计算你或指定玩家[player]的岛屿等级
    calculating: '<green>等级计算中...'
    estimated-wait: '<green>预计等待时间: [number]秒'
    in-queue: '<green>你处于队列中第[number]个'
    island-level-is: '<green>岛屿等级为: <aqua>[level]'
    required-points-to-next-level: '<green>等级进度: <gold> [progress]<aqua> /<yellow> [levelcost] <green>点数'
    deaths: '<red>([number]次死亡)'
    cooldown: '<red>还需等待<aqua>[time]<red>秒才能再次使用该指令'
    in-progress: '<gold>岛屿等级正在计算中...'
    time-out: '<red>等级计算超时, 请稍后再试'
  donate:
    parameters: "[hand [amount]]"
    description: "donate blocks to permanently raise island level"
    must-be-on-island: "<red>You must be on your island to donate blocks."
    no-permission: "<red>You do not have permission to donate blocks on this island."
    no-value: "<red>That block has no level value."
    invalid-amount: "<red>Invalid amount. Use a positive number."
    invalid-item: "<red>只能捐赠具有配置等级值的方块。"
    empty: "<red>There are no valid blocks to donate."
    cancelled: "<yellow>Donation cancelled. Items returned."
    success: "<green>Donated [number] blocks for <aqua>[points]<green> points! These points are permanent."
    confirm: "<red><bold>Confirm - Items will be DESTROYED!"
    cancel: "<green><bold>Cancel - Return Items"
    gui-title: "<black><bold>Donate Blocks"
    gui-info: "<gold>Donate blocks to your island|<gray>Currently donated: <gold>[points]<gray> points|<red>Warning: donated items are|<red>destroyed and cannot be returned!"
    preview: "<yellow>Points to add: <gold>[points]|<red>These items will be destroyed!"
    limit-reached: "<red>[material] 的捐赠限额已达到。"
    limit-notice: "<gold>某些方块受到限制|<gold>将不会被捐赠"
    hand:
      keyword: "hand"
      success: "<green>Donated [number] x [material] for <aqua>[points]<green> permanent points!"
      not-block: "<red>You must be holding a placeable block to donate."
      confirm-prompt: "<red>About to DESTROY <gold>[number] x [material]<red> for <aqua>[points]<red> permanent points."
    inv:
      keyword: "inv"
      confirm-header: "<red>即将从你的物品栏销毁以下方块："
      confirm-line: "<gold>[number] x [material] <gray>= <aqua>[points]<gray> 点"
      confirm-total: "<red>共计: <aqua>[points]<red> 永久点数。"
  
  top:
    description: 显示前十名
    gui-title: '<green>前十'
    gui-heading: '<gold>[name]: <aqua>[rank]'
    island-level: '<aqua>等级: [level]'
    warp-to: '<green>正在传送到[name]的岛屿'
  
  detail:
    description: "显示你的岛屿方块详情"
  level-details:
