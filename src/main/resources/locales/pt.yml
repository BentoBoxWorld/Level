---
admin:
  level:
    parameters: "<player>"
    description: calcula o nível da ilha para o jogador
    sethandicap:
      parameters: <player> [+/-]<handicap>
      description: |
        definir ou alterar o *handicap* da ilha
        ex. +10 removerá 10 níveis,
        30 definirá o handicap para 30,
        -20 adicionará 20 níveis
      changed: "<green> O handicap inicial da ilha foi alterado de [number] para [new_number]."
      invalid-level: "<red> Handicap inválido. Use um número inteiro."
  levelstatus:
    description: mostrar quantas ilhas estão na fila para escaneamento.
    islands-in-queue: "<green> Ilhas na fila: [number]"
  top:
    description: Mostra a lista dos dez primeiros
    unknown-world: "<red> Mundo desconhecido!"
    display: "<white>[rank]. <green>[name] <gray>- <aqua>[level]"
    remove:
      description: Remover jogador do Top 10
      parameters: "<player>"
  stats:
    description: "mostrar estatísticas das ilhas neste servidor"
    title: "Estatísticas das Ilhas do Servidor"
    world: "<green> [name]"
    no-data: "<red> Sem dados para processar."
    average-level: "Nível médio das ilhas: [number]"
    median-level: "Nível mediano das ilhas: [number]"
    mode-level: "Nível modal das ilhas: [number]"
    highest-level: "Nível mais alto das ilhas: [number]"
    lowest-level: "Nível mais baixo das ilhas: [number]"
    distribution: "Distribuição dos níveis das ilhas:"
    islands: "ilhas"
island:
  level:
    parameters: "[player]"
    description: Calcula o nível da sua ilha ou mostra o nível de [player]
    calculating: "<green> Calculando level..."
    estimated-wait: "<green> Espera estimada: [number] segundos."
    in-queue: "<green> Você é o número [number] na fila."
    island-level-is: "<green> O nível da ilha é <aqua>[level]"
    required-points-to-next-level: "<green> Progresso do nível: <gold> [progress]<aqua> /<yellow> [levelcost] <green> pontos"
    deaths: "<red>([number] mortes)"
    cooldown: "<red> Você deve esperar <aqua>[time] <red> segundos até que possa fazer isso novamente."
    in-progress: "<gold> O cálculo do nível da ilha está em andamento..."
    time-out: "<red> O cálculo do nível demorou muito. Por favor, tente novamente mais tarde."
  donate:
    parameters: "[hand [amount]]"
    description: "donate blocks to permanently raise island level"
    must-be-on-island: "<red>You must be on your island to donate blocks."
    no-permission: "<red>You do not have permission to donate blocks on this island."
    no-value: "<red>That block has no level value."
    invalid-amount: "<red>Invalid amount. Use a positive number."
    invalid-item: "<red>Apenas blocos com um valor de nível configurado podem ser doados."
    empty: "<red>There are no valid blocks to donate."
    cancelled: "<yellow>Donation cancelled. Items returned."
    success: "<green>Donated [number] blocks for <aqua>[points]<green> points! These points are permanent."
    confirm: "<red><bold>Confirm - Items will be DESTROYED!"
    cancel: "<green><bold>Cancel - Return Items"
    gui-title: "<black><bold>Donate Blocks"
    gui-info: "<gold>Donate blocks to your island|<gray>Currently donated: <gold>[points]<gray> points|<red>Warning: donated items are|<red>destroyed and cannot be returned!"
    preview: "<yellow>Points to add: <gold>[points]|<red>These items will be destroyed!"
    hand:
      keyword: "mao"
      success: "<green>Donated [number] x [material] for <aqua>[points]<green> permanent points!"
      not-block: "<red>You must be holding a placeable block to donate."
      confirm-prompt: "<red>About to DESTROY <gold>[number] x [material]<red> for <aqua>[points]<red> permanent points."
  detail:
    description: "mostra os detalhes dos blocos da sua ilha"
  top:
    description: Mostra os dez melhores
    gui-title: "<green> Top 10"
    gui-heading: "<gold>[name]: <aqua>[rank]"
    island-level: "<aqua> Level [level]"
    warp-to: "<green> Teletransportando para a ilha de [name]"
  level-details:
    above-sea-level-blocks: Blocos acima do nível do mar
    spawners: Spawners
    underwater-blocks: Blocos Subaquáticos
    all-blocks: Todos os blocos
    no-island: "<red> Sem ilha!"
    names-island: Ilha de [name]
    syntax: "[name] x [number]"
    hint: "<red> Execute level para ver o relatório de blocos."
protection:
